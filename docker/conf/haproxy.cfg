global
    log stdout format raw local0
    maxconn 4096
    nbthread 4

defaults
    log                 global
    mode                tcp
    option              tcplog
    option              dontlognull
    retries             3
    timeout connect     10s
    timeout client      1m
    timeout server      1m

#---------------------------------------------------------------------
# Frontend: accepts client SQL connections on port 26000
#---------------------------------------------------------------------
frontend cockroachdb_sql
    bind *:26000
    default_backend cockroachdb_nodes

#---------------------------------------------------------------------
# Frontend: HAProxy stats page (optional but useful)
#---------------------------------------------------------------------
frontend stats
    bind *:8888
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-legends
    stats show-node

#---------------------------------------------------------------------
# Backend: round-robin across all 5 CockroachDB nodes
# Health check uses the CockroachDB health endpoint on HTTP admin ports
#---------------------------------------------------------------------
backend cockroachdb_nodes
    balance             roundrobin
    option              httpchk GET /health?ready=1
    
    server roach1 roach1:26257 check port 8080 check inter 2s downinter 5s rise 3 fall 2
    server roach2 roach2:26257 check port 8081 check inter 2s downinter 5s rise 3 fall 2
    server roach3 roach3:26257 check port 8082 check inter 2s downinter 5s rise 3 fall 2
    server roach4 roach4:26257 check port 8083 check inter 2s downinter 5s rise 3 fall 2
    server roach5 roach5:26257 check port 8084 check inter 2s downinter 5s rise 3 fall 2
